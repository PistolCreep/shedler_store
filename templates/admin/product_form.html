{% extends 'admin/layout.html' %}
{% block title %}Форма товара{% endblock %}
{% block content %}
<section class="admin-section">
  <form class="admin-card form-grid" method="post">
    <h2>{% if product %}Редактирование товара{% else %}Добавление товара{% endif %}</h2>
    <label>Категория
      <select name="category_id" required>
        {% for item in categories %}
          <option value="{{ item.id }}" {% if product and product.category_id == item.id %}selected{% endif %}>{{ item.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Название<input type="text" name="name" value="{{ product.name if product else '' }}" required></label>
    <label>Slug<input type="text" name="slug" value="{{ product.slug if product else '' }}" required></label>
    <label>Цена<input type="number" name="price" value="{{ product.price if product else '' }}" required></label>
    <label>Площадь<input type="number" step="0.1" name="area" value="{{ product.area if product else '' }}" required></label>
    <label>Комнат<input type="number" name="rooms" value="{{ product.rooms if product else 1 }}" required></label>
    <label>Вместимость<input type="number" name="capacity" value="{{ product.capacity if product else 1 }}" required></label>
    <label>Сезонность<input type="text" name="seasonality" value="{{ product.seasonality if product else '' }}" required></label>
    <label>Срок изготовления<input type="text" name="production_time" value="{{ product.production_time if product else '' }}" required></label>
    <label class="full-width">Краткое описание<input type="text" name="short_description" value="{{ product.short_description if product else '' }}" required></label>
    <label class="full-width">Подробное описание<textarea name="description" rows="6" required>{{ product.description if product else '' }}</textarea></label>
    <label class="full-width">Характеристики<textarea name="specs" rows="8" required>{{ product.specs if product else '' }}</textarea></label>
    <label class="full-width">Ссылка на изображение<input type="text" name="image_url" value="{{ product.image_url if product else '' }}"></label>
    <label class="checkbox-row full-width"><input type="checkbox" name="is_featured" {% if product and product.is_featured %}checked{% endif %}> Показывать на главной</label>
    <button class="primary-btn" type="submit">Сохранить</button>
  </form>
</section>
{% endblock %}
