{% extends 'admin/layout.html' %}
{% block title %}Сообщения{% endblock %}
{% block content %}
<section class="admin-section">
  <div class="admin-card">
    <h2>Сообщения из формы контактов</h2>
    <div class="table-wrap">
      <table class="admin-table">
        <thead><tr><th>Дата</th><th>Имя</th><th>Контакты</th><th>Сообщение</th></tr></thead>
        <tbody>
          {% for item in messages %}
          <tr><td>{{ item.created_at }}</td><td>{{ item.name }}</td><td>{{ item.phone }}<br>{{ item.email }}</td><td>{{ item.message }}</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
